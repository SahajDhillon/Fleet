apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleetiq
  namespace: fleetiq
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fleetiq
  template:
    metadata:
      labels:
        app: fleetiq
    spec:
      containers:
        - name: fleetiq
          image: fleetiq:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fleetiq-secret
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: fleetiq
  namespace: fleetiq
spec:
  selector:
    app: fleetiq
  ports:
    - port: 80
      targetPort: 8000
